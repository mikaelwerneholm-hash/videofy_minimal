app = "videofy-2secure-api"
primary_region = "arn"

[build]
  dockerfile = "api/Dockerfile"

[env]
  APP_BASE_URL = "https://videofy-2secure-api.fly.dev"
  PROJECTS_ROOT = "projects"
  CONFIG_ROOT = "brands"
  CORS_ALLOW_ORIGINS = "https://DIN-APP.vercel.app,https://www.DIN-APP.vercel.app"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "videofy_data"
  destination = "/app/projects"
  initial_size = "3gb"
